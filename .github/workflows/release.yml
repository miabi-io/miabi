name: Release

on:
  push:
    tags: ["v1.*"]

permissions:
  contents: read
  packages: write

# Versions of the two images Miabi ships alongside itself. The literal here is
# the default and the reviewable record of what this release was tested against;
# a repository (or environment) variable of the same name overrides it without a
# code change — useful to re-cut a release against a patched dependency.
#
#   gh variable set GOMA_VERSION --body v0.12.0
#
# `||` falls back when the variable is unset OR set to the empty string.
env:
  # The Goma Gateway release this Miabi release is tested against. Prefer bumping
  # the default in a PR (with a test run) over tracking Goma's `latest` —
  # otherwise every Goma release silently reaches Miabi users on Goma's schedule,
  # not ours.
  GOMA_VERSION: ${{ vars.GOMA_VERSION || 'v0.11.0' }}
  # miabi/runner versions independently of the panel (0.0.x vs 1.0.x), so it
  # cannot inherit ${GITHUB_REF_NAME}: miabi/runner:1.0.0-beta.4 does not exist.
  RUNNER_VERSION: ${{ vars.RUNNER_VERSION || 'v0.0.7' }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the changelog can diff against prior tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the downloadable binaries so a license can unlock
          # Enterprise features. Empty is a harmless no-op — the binary still
          # runs as free Community until a valid license is installed.
          LICENSE_PUBLIC_KEY: ${{ vars.LICENSE_PUBLIC_KEY }}

  # One edition. Built with `-tags enterprise`, the image runs as free Community
  # until a license is installed, so the frictionless path is: pull `latest`, add
  # a license later, and features unlock with no re-pull or redeploy. Tags are
  # unsuffixed — there is no `-ce`/`-ee` split.
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "COMMIT=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # The Miabi image (API + web UI in one binary) is published to Docker Hub
      # (primary, matches the platform default miabi/miabi) and mirrored to GHCR.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Default runtime (Alpine, root).
      - name: Build and push Miabi
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            GO_TAGS=enterprise
            LICENSE_PUBLIC_KEY=${{ vars.LICENSE_PUBLIC_KEY }}
          tags: |
            miabi/miabi:latest
            miabi/miabi:${{ env.VERSION }}
            ghcr.io/miabi-io/miabi:latest
            ghcr.io/miabi-io/miabi:${{ env.VERSION }}

      # Rootless variant: same binary + web UI on a Debian runtime that runs as an
      # unprivileged user (docker/Dockerfile.debian).
      - name: Build and push Miabi (rootless)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.debian
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            GO_TAGS=enterprise
            LICENSE_PUBLIC_KEY=${{ vars.LICENSE_PUBLIC_KEY }}
          tags: |
            miabi/miabi:rootless
            miabi/miabi:latest-rootless
            miabi/miabi:${{ env.VERSION }}-rootless
            ghcr.io/miabi-io/miabi:rootless
            ghcr.io/miabi-io/miabi:latest-rootless
            ghcr.io/miabi-io/miabi:${{ env.VERSION }}-rootless


  # Bump deploy/install.sh on main, via a pull request.
  bump-installer:
    runs-on: ubuntu-latest
    # Wait for the images. This PR is what tells main to install them, and main must
    # never advertise a version nobody can pull
    needs: [release, image]
    permissions:
      contents: write      # push the bump branch
      pull-requests: write # open the PR
      packages: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main # bump main, not the tag — the tag is already cut
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      # Anonymous pulls suffice for public images; logging in keeps the check working
      # if the GHCR package is ever made private.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify every pinned image exists
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"   # docker tags drop the leading "v"

          # GOMA_VERSION/RUNNER_VERSION may come from repository variables, so validate
          # rather than trust: a typo would open a PR pinning an image nobody published.
          for v in GOMA_VERSION RUNNER_VERSION; do
            case "${!v}" in
              v[0-9]*) ;;
              *) echo "::error::$v must look like v1.2.3, got '${!v}'"; exit 1 ;;
            esac
          done

          # Query the registries themselves, not Docker Hub's web API, so GHCR is
          # covered too. Retry: a manifest can lag a few seconds behind the push.
          assert_image() { # <ref>
            for attempt in 1 2 3 4 5; do
              if docker buildx imagetools inspect "$1" >/dev/null 2>&1; then
                echo "  ok $1"; return 0
              fi
              echo "  waiting for $1 (attempt ${attempt}/5)"; sleep 10
            done
            echo "::error::$1 was never published — refusing to bump main to a version that cannot be installed"
            exit 1
          }
          assert_image "miabi/miabi:${VERSION}"
          assert_image "ghcr.io/miabi-io/miabi:${VERSION}"
          assert_image "jkaninda/goma-gateway:${GOMA_VERSION#v}"
          assert_image "miabi/runner:${RUNNER_VERSION#v}"

      - name: Bump the pinned versions
        id: bump
        run: |
          set -euo pipefail

          sed -i \
            -e "s|^MIABI_VERSION=.*|MIABI_VERSION=\"\${MIABI_VERSION:-${GITHUB_REF_NAME}}\"|" \
            -e "s|^GOMA_VERSION=.*|GOMA_VERSION=\"\${GOMA_VERSION:-${GOMA_VERSION}}\"|" \
            -e "s|^RUNNER_VERSION=.*|RUNNER_VERSION=\"\${RUNNER_VERSION:-${RUNNER_VERSION}}\"|" \
            deploy/install.sh

          # deploy/install-agent.sh is deliberately untouched — see the AGENT_VERSION
          # note at the top of this file.

          # Fail loudly rather than opening a PR that still says :latest.
          # -F (fixed string): the pattern contains `${...}`, and a `$` mid-regex is an
          # anchor in BSD grep, so a plain -q silently never matches.
          grep -qF "MIABI_VERSION=\"\${MIABI_VERSION:-${GITHUB_REF_NAME}}\"" deploy/install.sh
          grep -qF "GOMA_VERSION=\"\${GOMA_VERSION:-${GOMA_VERSION}}\"" deploy/install.sh
          grep -qF "RUNNER_VERSION=\"\${RUNNER_VERSION:-${RUNNER_VERSION}}\"" deploy/install.sh
          bash -n deploy/install.sh

          if git diff --quiet -- deploy/install.sh; then
            echo "::notice::main already pins ${GITHUB_REF_NAME} — nothing to bump."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git --no-pager diff --stat -- deploy/install.sh
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open the bump pull request
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="release/bump-${GITHUB_REF_NAME}"
          VERSION="${GITHUB_REF_NAME#v}" # for the image table below

          git config user.name  "miabi-bot"
          git config user.email "bot@miabi.io"

          # -B and --force so re-running the workflow overwrites the branch instead of
          # failing on one that already exists. --force-with-lease is the usual reflex,
          # but on the *first* run there is no remote-tracking ref to lease against and
          # it aborts with "stale info". The branch is workflow-owned (nobody else
          # pushes to release/bump-*), so a plain force is the safe one here.
          git checkout -B "$BRANCH"
          git add deploy/install.sh
          git commit -m "chore(release): pin the installer to ${GITHUB_REF_NAME}"
          git push --force origin "$BRANCH"

          # Idempotent: a re-run updates the branch and reuses the open PR.
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "::notice::the PR for $BRANCH is already open — updated it."
            exit 0
          fi

          # The body goes through a file, not --body: every line of an inline string
          # would have to start at column 0 to avoid leading spaces in the markdown,
          # and column 0 is outside this YAML block scalar. The heredoc is unquoted so
          # ${VERSION} et al. expand; \` therefore has to be escaped to survive as a
          # literal backtick rather than opening a command substitution.
          sed 's/^ \{10\}//' > /tmp/pr-body.md <<EOF
          Cut by the release workflow for **${GITHUB_REF_NAME}**, after every image below was confirmed published.

          | Image | Tag |
          |---|---|
          | \`miabi/miabi\` | \`${VERSION}\` |
          | \`jkaninda/goma-gateway\` | \`${GOMA_VERSION#v}\` |
          | \`miabi/runner\` | \`${RUNNER_VERSION#v}\` |

          \`get.miabi.io\` serves \`deploy/install.sh\` from **main**, so merging this is
          what makes ${GITHUB_REF_NAME} the version new installs get. Until it is merged,
          main keeps pinning the previous release — deliberately: the installer must never
          advertise a version before its images exist.

          \`deploy/install-agent.sh\` is not touched here. The node agent releases from its
          own repository, so its pin is bumped by hand.

          Merge when you are ready to make ${GITHUB_REF_NAME} the default install.
          EOF

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): pin the installer to ${GITHUB_REF_NAME}" \
            --body-file /tmp/pr-body.md

          echo "::notice::Opened a PR pinning the installer to ${GITHUB_REF_NAME}."
