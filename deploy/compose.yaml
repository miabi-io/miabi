# Miabi — production stack.
#
# Goma Gateway terminates TLS (ACME/Let's Encrypt) and routes the panel domain
# to Miabi, a single binary serving both the API and the web UI.
# Miabi manages app/database containers on the shared `miabi` network
# and writes Goma route files into the shared providers volume (hot-reloaded).
#
# Quick start:
#   cp .env.example .env   # then edit: domain + secrets (openssl rand -hex 32)
#   docker compose up -d
# Or run ./install.sh for a guided one-line install.
# For local development from source, use compose.dev.yaml instead.

services:
  miabi-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    # Platform identity
    labels:
      io.miabi.part-of: miabi
      io.miabi.role: platform-db
      io.miabi.managed-by: compose
      io.miabi.protected: "true"
    environment:
      POSTGRES_USER: ${MIABI_DB_USER:-miabi}
      POSTGRES_PASSWORD: ${MIABI_DB_PASSWORD:?set MIABI_DB_PASSWORD}
      POSTGRES_DB: ${MIABI_DB_NAME:-miabi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [miabi]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MIABI_DB_USER:-miabi}"]
      interval: 5s
      timeout: 3s
      retries: 10

  miabi-redis:
    image: redis:7-alpine
    restart: unless-stopped
    labels:
      io.miabi.part-of: miabi
      io.miabi.role: platform-cache
      io.miabi.managed-by: compose
      io.miabi.protected: "true"
    command: ["redis-server", "--requirepass", "${MIABI_REDIS_PASSWORD:?set MIABI_REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    networks: [miabi]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${MIABI_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    # install.sh pins this to the Goma release the Miabi release was tested with.
    image: ${GOMA_IMAGE:-jkaninda/goma-gateway:latest}
    restart: unless-stopped
    # Stable identity so Miabi can find the central gateway to join it to the
    # shared cluster ingress overlay (miabi-ingress). The role label is the primary
    # discovery key (survives a custom compose project name); the fixed
    # container_name is only a fallback for stacks deployed before these labels
    # existed. Must match edgegateway.CentralContainerName / CentralRoleValue.
    container_name: miabi-gateway
    labels:
      io.miabi.part-of: miabi
      io.miabi.role: gateway
      io.miabi.managed-by: compose
      io.miabi.protected: "true"
    # No command needed: Goma reads /etc/goma/goma.yml by default (override the
    # path with the GOMA_CONFIG_FILE env if you mount it elsewhere). The config
    # interpolates ${MIABI_DOMAIN}, ${MIABI_ACME_EMAIL}, and the Redis
    # password from the env below, so the panel domain lives only in .env — no
    # need to edit goma.yml.
    depends_on:
      miabi-redis: { condition: service_healthy }
    environment:
      MIABI_DOMAIN: ${MIABI_DOMAIN:?set MIABI_DOMAIN}
      MIABI_ACME_EMAIL: ${MIABI_ACME_EMAIL:-admin@example.com}
      # Goma uses Redis for shared caching + distributed rate limiting (see goma.yml).
      MIABI_REDIS_PASSWORD: ${MIABI_REDIS_PASSWORD:?set MIABI_REDIS_PASSWORD}
      # Must match the miabi service's value: Miabi encrypts the config it writes
      # and Goma decrypts it here before applying. Empty (default) = no config
      # encryption on either side.
      GOMA_CONFIG_ENCRYPTION_KEY: ${GOMA_CONFIG_ENCRYPTION_KEY:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./goma/goma.yml:/etc/goma/goma.yml:ro
      - gateway-providers:/etc/goma/providers
      - gateway-certs:/etc/letsencrypt
    networks: [miabi]
    # Goma serves /healthz on its HTTP port. Probed on the loopback inside the
    # container, so it reports "Goma is serving" rather than "the host's :80 answers".
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  miabi:
    # Single binary serving the API + web UI. The background worker (deploys,
    # provisioning, notifications) runs embedded in this process by default;
    # add a separate `command: ["worker"]` service to scale it out.
    image: ${MIABI_IMAGE:-miabi/miabi:latest}
    restart: unless-stopped
    # Miabi's own identity. It holds the Docker socket and enumerates every
    # container on the node — including this one — so it needs to be able to tell
    # itself apart from a user's app. (A runtime /proc self-check already protects
    # THIS container; the label is what protects the rest of the stack, on any node.)
    labels:
      io.miabi.part-of: miabi
      io.miabi.role: control-plane
      io.miabi.managed-by: compose
      io.miabi.protected: "true"
    # Runs as root by default. To run unprivileged, uncomment `user` below — the
    # image ships a miabi account (uid/gid 10001) that owns its data dirs. Either
    # way it needs the host's "docker" group to read /var/run/docker.sock; set
    # DOCKER_GID to the host's docker GID:
    #   echo "DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)" >> .env
    # user: "10001:10001"
    group_add:
      - "${DOCKER_GID:-999}"
    depends_on:
      miabi-postgres: { condition: service_healthy }
      miabi-redis: { condition: service_healthy }
    environment:
      MIABI_ENV: production
      MIABI_PORT: "9000"
      # How chatty Miabi's own logs are: debug | info | warn | error. Empty follows
      # the environment (info in production). See MIABI_LOG_LEVEL in .env.example.
      MIABI_LOG_LEVEL: ${MIABI_LOG_LEVEL:-}
      MIABI_DB_HOST: miabi-postgres
      MIABI_DB_USER: ${MIABI_DB_USER:-miabi}
      MIABI_DB_PASSWORD: ${MIABI_DB_PASSWORD}
      MIABI_DB_NAME: ${MIABI_DB_NAME:-miabi}
      MIABI_REDIS_ADDR: miabi-redis:6379
      MIABI_REDIS_PASSWORD: ${MIABI_REDIS_PASSWORD}
      MIABI_JWT_SECRET: ${MIABI_JWT_SECRET:?set MIABI_JWT_SECRET}
      MIABI_ENCRYPTION_KEY: ${MIABI_ENCRYPTION_KEY:?set MIABI_ENCRYPTION_KEY}
      # Optional: encrypts the sensitive parts of gateway config (middleware rules
      # + TLS) at rest. Miabi encrypts what it writes; each Goma gateway decrypts
      # with the SAME key — so it must match the gateway service above (Miabi also
      # injects it into remote edge gateways it provisions). Empty = off.
      GOMA_CONFIG_ENCRYPTION_KEY: ${GOMA_CONFIG_ENCRYPTION_KEY:-}
      # Seeded on first boot; production refuses to start on the default password.
      MIABI_ADMIN_EMAIL: ${MIABI_ADMIN_EMAIL:-admin@example.com}
      MIABI_ADMIN_PASSWORD: ${MIABI_ADMIN_PASSWORD:?set MIABI_ADMIN_PASSWORD}
      # Public panel URL. Required: it is also the CORS allowlist — production
      # rejects a "*" wildcard origin, so this must be a concrete origin.
      MIABI_WEB_URL: ${MIABI_WEB_URL:?set MIABI_WEB_URL to your panel's public URL, e.g. https://miabi.example.com}
      MIABI_CORS_ORIGINS: ${MIABI_CORS_ORIGINS:-${MIABI_WEB_URL}}
      # Public URL remote nodes reach this control plane at (for node gateways'
      # HTTP route provider). Required only when adding remote nodes.
      MIABI_CONTROL_URL: ${MIABI_WEB_URL:-}
      # Shared Docker network Goma + managed app containers join (matches the
      # `miabi` network below; also Miabi's EnsureNetwork default).
      MIABI_PROXY_NETWORK: miabi
      # ACME contact for gateways Miabi provisions on managed nodes.
      MIABI_ACME_EMAIL: ${MIABI_ACME_EMAIL:-admin@example.com}
      MIABI_GOMA_PROVIDER_DIR: /etc/goma/providers
      # Gateways Miabi provisions on remote nodes run the same Goma image, at the
      # same tag, as the gateway service above — one variable pins both, so a
      # remote node can never drift onto a different Goma version than the panel.
      MIABI_NODE_GATEWAY_IMAGE: ${GOMA_IMAGE:-jkaninda/goma-gateway:latest}
      # The image shown in the runner enrollment command. miabi/runner has its own
      # release cadence (0.0.x while the panel is 1.0.x), so it is pinned on its
      # own — never derived from the panel's tag.
      MIABI_RUNNER_IMAGE: ${RUNNER_IMAGE:-miabi/runner:latest}
      # Built-in OCI registry. Leave every one of these empty to manage the
      # registry from the UI: a non-empty value here is a one-way override that
      # pins the setting and the UI can no longer change it.
      MIABI_REGISTRY_ENABLED: ${MIABI_REGISTRY_ENABLED:-}
      MIABI_REGISTRY_HOST: ${MIABI_REGISTRY_HOST:-}
      MIABI_REGISTRY_STORAGE: ${MIABI_REGISTRY_STORAGE:-}
      MIABI_REGISTRY_S3_ENDPOINT: ${MIABI_REGISTRY_S3_ENDPOINT:-}
      MIABI_REGISTRY_S3_BUCKET: ${MIABI_REGISTRY_S3_BUCKET:-}
      MIABI_REGISTRY_S3_REGION: ${MIABI_REGISTRY_S3_REGION:-}
      MIABI_REGISTRY_S3_ACCESS_KEY: ${MIABI_REGISTRY_S3_ACCESS_KEY:-}
      MIABI_REGISTRY_S3_SECRET_KEY: ${MIABI_REGISTRY_S3_SECRET_KEY:-}
      MIABI_REGISTRY_S3_FORCE_PATH_STYLE: ${MIABI_REGISTRY_S3_FORCE_PATH_STYLE:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gateway-providers:/etc/goma/providers
      # Shared log store: deploy, pipeline, job, and backup logs are externalized
      # out of Postgres into this volume (MIABI_LOG_DIR, default
      # /var/lib/miabi/logs), keeping only a bounded tail in the database. If you
      # add a separate `worker` service, mount this SAME volume there so the
      # control plane can read the logs it writes. See MIABI_LOG_* in .env.example.
      - miabi-logs:/var/lib/miabi/logs
      # Optional: bind the host procfs read-only so the admin Node page can report
      # real host CPU/memory (path: MIABI_HOST_PROC, default /host/proc). Remove it
      # and Miabi falls back to /proc — which already reflects host stats from
      # inside the container — or to the container-stats aggregate.
      - /proc:/host/proc:ro
    networks: [miabi]
    # /healthz is the LIVENESS probe: 200 as soon as the server is serving, asserting
    # nothing about dependencies. /readyz also pings Postgres, Redis and Docker — wrong
    # for a healthcheck that drives restarts, since restarting Miabi cannot fix a
    # database and would only add an outage to an outage.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  pgdata:
  redisdata:
  gateway-providers:
  gateway-certs:
  miabi-logs:

# The shared `miabi` bridge — Goma, Miabi's runtime EnsureNetwork("miabi"), and
# every routed app/database container attach to it. It is declared EXTERNAL so it
# is created once, up front, with a controllable CIDR (install.sh does this) and
# survives `docker compose down` instead of being recreated from Docker's small
# default address pool. If you run compose by hand, create it first:
#   docker network create --driver bridge --subnet 10.63.0.0/16 miabi
# (any roomy CIDR that doesn't overlap MIABI_NETWORK_POOL_CIDR or your LAN).
networks:
  miabi:
    name: miabi
    external: true
