# Miabi with Traefik — production stack WITHOUT Goma Gateway.
#
# This variant swaps Goma Gateway for Traefik as the edge proxy. Traefik
# terminates TLS (ACME/Let's Encrypt) and routes traffic by reading Docker
# labels off containers on the shared `miabi` network.
#
# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT — read before using this instead of the default (Goma) stack:
#
# 1. Traefik labels are added MANUALLY. Miabi does NOT generate `traefik.*`
#    labels for your apps — its built-in Domain/Route management and managed
#    (DNS-01) certificates are Goma features and do nothing here. To expose an
#    app, add its `traefik.*` labels yourself in the panel:
#        App → Settings → Container labels  (the custom-labels feature)
#    Example labels for an app that listens on port 8080:
#        traefik.enable                                  = true
#        traefik.http.routers.<app>.rule                 = Host(`blog.example.com`)
#        traefik.http.routers.<app>.entrypoints          = websecure
#        traefik.http.routers.<app>.tls.certresolver     = le
#        traefik.http.services.<app>.loadbalancer.server.port = 8080
#    (Reserved io.miabi.* / com.docker.* keys are rejected — that's expected.)
#
# 2. Rolling and canary deployments REQUIRE Goma Gateway. Those strategies work
#    by reweighting the proxy's backends (traffic shifting / zero-downtime swap),
#    which only Miabi's Goma integration drives. Traefik here routes by static
#    per-container labels that Miabi does not reconfigure mid-deploy, so:
#        → Use the "Recreate" deploy strategy for every app on this stack.
#          (Brief downtime while the container is replaced.)
#        → Rolling and Canary will NOT shift traffic correctly under Traefik.
#    If you need zero-downtime rolling or canary releases, use the default
#    Goma stack (compose.yaml) instead.
#
# 3. The built-in container registry REQUIRES Goma Gateway. Its user/workspace
#    authentication is enforced by Goma's `forwardAuth` middleware: the registry
#    runs auth-less behind the gateway, and Goma forwards every /v2/* request to
#    Miabi's /internal/registry/auth endpoint to validate the Docker credentials
#    (username = workspace name, password = API key) and scope the repo path to
#    that workspace. Traefik is not wired for this callback, so on this stack:
#        → Leave the built-in registry OFF (MIABI_REGISTRY_ENABLED=false, default).
#          Use an external/registry provider (Docker Hub, GHCR, …) instead.
#    Use the default Goma stack (compose.yaml) if you need the built-in registry.
#
# 4. App containers must share the `miabi` network so Traefik can reach them.
#    They do: MIABI_PROXY_NETWORK=miabi attaches every managed app container to
#    it, and Traefik's Docker provider is pinned to the same network below.
# ─────────────────────────────────────────────────────────────────────────────
#
# Quick start:
#   cp .env.example .env   # then edit: MIABI_DOMAIN + secrets (openssl rand -hex 32)
#   docker compose -f compose.traefik.yaml up -d

services:
  miabi-postgres:
    image: postgres:17-alpine
    # Platform identity: lets Miabi recognize its own stack — keeps these out of the
    # "Import from Docker" list and refuses a stop/remove from the containers page.
    # On the reverse proxy the role is also how Miabi finds it to join the cluster
    # ingress overlay. See internal/docker/labels.go.
    labels:
      io.miabi.part-of: miabi
      io.miabi.role: platform-db
      io.miabi.managed-by: compose
      io.miabi.protected: "true"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MIABI_DB_USER:-miabi}
      POSTGRES_PASSWORD: ${MIABI_DB_PASSWORD:?set MIABI_DB_PASSWORD}
      POSTGRES_DB: ${MIABI_DB_NAME:-miabi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [miabi]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MIABI_DB_USER:-miabi}"]
      interval: 5s
      timeout: 3s
      retries: 10

  miabi-redis:
    image: redis:7-alpine
    labels:
      io.miabi.part-of: miabi
      io.miabi.role: platform-cache
      io.miabi.managed-by: compose
      io.miabi.protected: "true"
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${MIABI_REDIS_PASSWORD:?set MIABI_REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    networks: [miabi]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${MIABI_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  traefik:
    image: traefik:v3.3
    labels:
      io.miabi.part-of: miabi
      io.miabi.role: gateway
      io.miabi.managed-by: compose
      io.miabi.protected: "true"
    restart: unless-stopped
    command:
      # Route by Docker labels; only containers with traefik.enable=true are
      # exposed, and Traefik reaches them over the shared `miabi` network.
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=miabi"
      # HTTP (80) + HTTPS (443); redirect all HTTP to HTTPS. The ACME HTTP-01
      # challenge is still served on :80 (Traefik handles it before the redirect).
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt via HTTP-01. Point at the staging CA while testing to
      # avoid rate limits: --certificatesresolvers.le.acme.caserver=...
      - "--certificatesresolvers.le.acme.email=${MIABI_ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
    depends_on:
      miabi-redis: { condition: service_healthy }
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only socket for label discovery. For a hardened setup put a
      # docker-socket-proxy in front instead of mounting the socket directly.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks: [miabi]

  miabi:
    # Single binary serving the API + web UI. The background worker (deploys,
    # provisioning, notifications) runs embedded in this process by default;
    # add a separate `command: ["worker"]` service to scale it out.
    image: ${MIABI_IMAGE:-miabi/miabi:latest}
    restart: unless-stopped
    # Runs as root by default. To run unprivileged, uncomment `user` below — the
    # image ships a miabi account (uid/gid 10001) that owns its data dirs. Either
    # way it needs the host's "docker" group to read /var/run/docker.sock; set
    # DOCKER_GID to the host's docker GID:
    #   echo "DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)" >> .env
    # user: "10001:10001"
    group_add:
      - "${DOCKER_GID:-999}"
    depends_on:
      miabi-postgres: { condition: service_healthy }
      miabi-redis: { condition: service_healthy }
    environment:
      MIABI_ENV: production
      MIABI_PORT: "9000"
      MIABI_DB_HOST: miabi-postgres
      MIABI_DB_USER: ${MIABI_DB_USER:-miabi}
      MIABI_DB_PASSWORD: ${MIABI_DB_PASSWORD}
      MIABI_DB_NAME: ${MIABI_DB_NAME:-miabi}
      MIABI_REDIS_ADDR: miabi-redis:6379
      MIABI_REDIS_PASSWORD: ${MIABI_REDIS_PASSWORD}
      MIABI_JWT_SECRET: ${MIABI_JWT_SECRET:?set MIABI_JWT_SECRET}
      MIABI_ENCRYPTION_KEY: ${MIABI_ENCRYPTION_KEY:?set MIABI_ENCRYPTION_KEY}
      # Optional: injected into edge gateways so Goma encrypts its sensitive
      # config (middleware rules + TLS) at rest. Empty = off.
      GOMA_CONFIG_ENCRYPTION_KEY: ${GOMA_CONFIG_ENCRYPTION_KEY:-}
      MIABI_WEB_URL: ${MIABI_WEB_URL:-}
      MIABI_CORS_ORIGINS: ${MIABI_WEB_URL:-*}
      MIABI_CONTROL_URL: ${MIABI_WEB_URL:-}
      # Shared Docker network Traefik + managed app containers join (matches the
      # `miabi` network below; also Miabi's EnsureNetwork default). Traefik can
      # only route to app containers that live on this network.
      MIABI_PROXY_NETWORK: miabi
      # NOTE: no MIABI_GOMA_PROVIDER_DIR here — this stack has no Goma. Miabi's
      # Goma route-sync is inert; Traefik owns routing + TLS via the labels you
      # add per app (see the header). Managed DNS-01 certs are also Goma-only.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared log store: deploy, pipeline, job, and backup logs are externalized
      # out of Postgres into this volume (MIABI_LOG_DIR, default
      # /var/lib/miabi/logs), keeping only a bounded tail in the database. If you
      # add a separate `worker` service, mount this SAME volume there so the
      # control plane can read the logs it writes. See MIABI_LOG_* in .env.example.
      - miabi-logs:/var/lib/miabi/logs
      # Optional: bind the host procfs read-only so the admin Node page can report
      # real host CPU/memory (path: MIABI_HOST_PROC, default /host/proc).
      - /proc:/host/proc:ro
    # Traefik routes the panel domain to Miabi (port 9000). This is the one place
    # Miabi itself carries traefik.* labels; your apps get theirs via the panel.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.miabi.rule=Host(`${MIABI_DOMAIN:?set MIABI_DOMAIN}`)"
      - "traefik.http.routers.miabi.entrypoints=websecure"
      - "traefik.http.routers.miabi.tls.certresolver=le"
      - "traefik.http.services.miabi.loadbalancer.server.port=9000"
      # Platform identity — see internal/docker/labels.go. List form here because
      # this service already carries Traefik's routing labels.
      - "io.miabi.part-of=miabi"
      - "io.miabi.role=control-plane"
      - "io.miabi.managed-by=compose"
      - "io.miabi.protected=true"
    networks: [miabi]

volumes:
  pgdata:
  redisdata:
  traefik-certs:
  miabi-logs:

# Shared `miabi` bridge Traefik + Miabi + every routed app join. Declared EXTERNAL
# so it's created once with a controllable, roomy CIDR (not Docker's small default
# pool) and survives `compose down`. Create it first if running by hand:
#   docker network create --driver bridge --subnet 10.63.0.0/16 miabi
networks:
  miabi:
    labels:
      io.miabi.part-of: miabi
      io.miabi.role: control-plane
      io.miabi.managed-by: compose
      io.miabi.protected: "true"
    name: miabi
    external: true
